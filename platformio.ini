; SpaceMelodyLab TOAST v1.1 — кастомная прошивка
; Плата: Arduino Pro Micro Type-C (ATmega32U4, 5V/16MHz)
;
; Сборка:      pio run -e toast_probe        / pio run -e toast_firmware
; Прошивка:    pio run -e toast_probe -t upload
; Монитор:     pio device monitor

[platformio]
src_dir = src
default_envs = toast_firmware

[env]
; Версии зафиксированы: firmware близка к пределу flash, поэтому случайное
; обновление framework/graphics library не должно менять размер бинарника.
platform = atmelavr@5.3.0
board = sparkfun_promicro16
framework = arduino
monitor_speed = 115200

; --- скетч-зонд для определения распиновки ---
[env:toast_probe]
build_src_filter = +<toast_probe/>

; --- основная прошивка MIDI-контроллера ---
[env:toast_firmware]
build_src_filter = +<toast_firmware/>
; Обязателен для ВСЕХ translation units библиотеки: без него две встроенные
; splash-картинки добавляют ~1.5 KiB и firmware не помещается в ATmega32U4.
; AVR-specific size optimizations leave USB CDC enabled. RX Serial1 is unused;
; a small buffer saves SRAM while the 64-byte MIDI TX buffer remains intact.
build_flags =
    -DSSD1306_NO_SPLASH
    -mcall-prologues
    -mrelax
    -Wl,--relax
    -DSERIAL_RX_BUFFER_SIZE=8
lib_deps =
    arduino-libraries/MIDIUSB@1.0.5
    adafruit/Adafruit SSD1306@2.5.17
    adafruit/Adafruit GFX Library@1.12.6
    adafruit/Adafruit BusIO@1.17.4
